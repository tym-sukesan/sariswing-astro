name: Build and Deploy via FTP

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
      PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy dist/ to Lolipop via FTP
        env:
          LOLIPOP_FTP_HOST: ${{ secrets.LOLIPOP_FTP_HOST }}
          LOLIPOP_FTP_USER: ${{ secrets.LOLIPOP_FTP_USER }}
          LOLIPOP_FTP_PASSWORD: ${{ secrets.LOLIPOP_FTP_PASSWORD }}
          LOLIPOP_FTP_REMOTE_DIR: ${{ secrets.LOLIPOP_FTP_REMOTE_DIR }}
        run: |
          lftp -u "$LOLIPOP_FTP_USER","$LOLIPOP_FTP_PASSWORD" "$LOLIPOP_FTP_HOST" <<EOF
          set ftp:ssl-allow no
          set ftp:passive-mode on
          mirror -R --delete --verbose dist/ "$LOLIPOP_FTP_REMOTE_DIR"
          bye
          EOF
